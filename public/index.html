<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Background Decorations -->
    <div class="bg-decoration bg-dot-1"></div>
    <div class="bg-decoration bg-dot-2"></div>
    <div class="bg-decoration bg-line-1"></div>
    <div class="bg-decoration bg-line-2"></div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <span class="toggle-icon">🌙</span>
    </button>

    <!-- Toast Container (Future Feature) -->
    <div id="toastContainer"></div>

    <main class="app">

        <!-- Delete Confirmation Modal -->

        <div id="deleteModal" class="modal-overlay">

            <div class="modal-card">

                <h2>
                    Delete Task?
                </h2>

                <p>
                    This action cannot be undone.
                </p>

                <div class="modal-actions">

                    <button id="cancelDeleteBtn" class="modal-btn cancel-btn">
                        Cancel
                    </button>

                    <button id="confirmDeleteBtn" class="modal-btn delete-confirm-btn">
                        Delete
                    </button>

                </div>

            </div>

        </div>

        <!-- Hero -->
        <header class="hero">

            <h1>
                TaskFlow
                <span class="star">✦</span>
            </h1>

            <p>
                Plan. Focus. Execute.
            </p>

        </header>

        <!-- Add Task -->

        <!-- Delete Confirmation Modal -->

        <div id="deleteModal" class="modal-overlay">

            <div class="modal-card">

                <h2>
                    Delete Task?
                </h2>

                <p>
                    This action cannot be undone.
                </p>

                <div class="modal-actions">

                    <button id="cancelDeleteBtn" class="modal-btn cancel-btn">
                        Cancel
                    </button>

                    <button id="confirmDeleteBtn" class="modal-btn delete-confirm-btn">
                        Delete
                    </button>

                </div>

            </div>

        </div>

        <section class="input-card">

            <input type="text" id="taskInput" placeholder="What needs to be done?" aria-label="Task input">

            <button id="addBtn" class="add-btn">
                Add
            </button>

        </section>

        <!-- Stats -->
        <section class="stats-container">

            <div class="stat-card">

                <div class="stat-value" id="taskCount">
                    0
                </div>

                <div class="stat-label">
                    Total Tasks
                </div>

            </div>

            <div class="stat-card">

                <div class="stat-value" id="progressText">
                    0%
                </div>

                <div class="stat-label">
                    Completed
                </div>

            </div>

        </section>

        <!-- Progress -->
        <section class="progress-section">

            <div class="progress-label">
                Today's Progress
            </div>

            <div class="progress-bar">

                <div id="progressFill" class="progress-fill"></div>

            </div>

        </section>

        <!-- Tasks -->
        <section class="tasks-section">

            <!-- Loading State -->
            <div id="loadingState" class="loading-state">
                Loading tasks...
            </div>

            <!-- Task List -->
            <ul id="taskList" class="task-list"></ul>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">

                <div class="empty-icon">
                    🎯
                </div>

                <h3>
                    No tasks yet
                </h3>

                <p>
                    Start by adding your first task and
                    begin building momentum.
                </p>

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
