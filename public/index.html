<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Background decorative elements -->
    <div class="bg-decoration bg-dot-1"></div>
    <div class="bg-decoration bg-dot-2"></div>
    <div class="bg-decoration bg-line-1"></div>
    <div class="bg-decoration bg-line-2"></div>

    <!-- Theme toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <span class="toggle-icon">🌙</span>
    </button>

    <main class="app">
        <header class="hero">
            <h1>TaskFlow <span class="star">✦</span></h1>
            <p>Plan. Focus. Execute.</p>
        </header>

        <section class="input-card">
            <input
                type="text"
                id="taskInput"
                placeholder="What needs to be done?"
                aria-label="Task input"
            >
            <button id="addBtn" class="add-btn">
                Add
            </button>
        </section>

        <section class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="taskCount">0</div>
                <div class="stat-label">Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="progressText">0%</div>
                <div class="stat-label">Done</div>
            </div>
        </section>

        <section class="progress-section">
            <div class="progress-label">Progress</div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </section>

        <section class="tasks-section">
            <ul id="taskList" class="task-list"></ul>
            <div id="emptyState" class="empty-state">
                <p>No tasks yet. Add one to get started.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
